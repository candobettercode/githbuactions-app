name: Hello World

on:
  workflow_dispatch:

jobs:
  say-hello-inline-bash:
    runs-on: ubuntu-latest
    steps:
      - run: 
          echo "Hello from an inline bash script in a GitHub Action Workflow!"

  say-hello-inline-python:
    runs-on: ubuntu-latest
    steps:
      - run: |
          print('Hello from an inline Python script in a GitHub Action Workflow!')
          print('This is a multi-line script, demonstrating how to use Python in GitHub Actions.')
        shell: 
          python